# Application
spring.application.name=HMS
server.port=8080

# H2 Database Configuration
spring.datasource.url=jdbc:h2:file:./data/hospitaldb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=hms@2024

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# JWT Configuration
jwt.secret=HospitalManagementSystemSecretKeyForJWTTokenGeneration2024VeryLongSecretKey
jwt.expiration=86400000

# CORS
spring.web.cors.allowed-origins=http://localhost:3000,https://hms-two-gamma.vercel.app/login
